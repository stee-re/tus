<?xml version="1.0" encoding="utf-8"?>
<svg xmlns="http://www.w3.org/2000/svg"
     viewBox="0 0 420 64"
     width="420" height="64"
     role="img" aria-label="Tús — Your private start page">
    <defs>
        <style>
            <![CDATA[
      .stroke { fill: none; stroke: currentColor; stroke-linecap: round; stroke-linejoin: round; stroke-width: 3.5; }
      .word { font-family: Inter, ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial; font-size: 28px; font-weight: 600; fill: currentColor; }
      .tag { font-family: Inter, ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial; font-size: 12px; fill: #6b7280; }
    ]]>
        </style>
    </defs>
    <!-- Icon (left) -->
    <g transform="translate(8,4)" fill="none" stroke="currentColor">
        <path class="stroke" d="M8 24 L32 8 L56 24" />
        <rect x="12" y="24" width="40" height="28" rx="3.5" class="stroke"/>
        <path class="stroke" d="M32 34 v12" stroke-width="2"/>
    </g>
    <!-- Wordmark: Tús -->
    <g transform="translate(100,40)">
        <!-- Use a plain text element; browsers will fallback if Inter isn't available -->
        <text x="0" y="-6" class="word">Tús</text>
        <text x="0" y="14" class="tag">Your private start page</text>
    </g>
</svg>
